<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GitHub TXT Database</title>
</head>
<body>

<h2>GitHub TXT Database</h2>

<textarea id="input" rows="5" cols="50"></textarea><br><br>

<button onclick="save()">Save</button>

<script>
const OWNER = "YOUR_USERNAME";
const REPO = "YOUR_REPO";
const FILE = "database.txt";
const BRANCH = "main";

// WARNING: Anyone can see this token.
const TOKEN = "github_pat_xxxxxxxxxxxxxxxxx";

async function save() {

    const api =
      `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;

    // Get current file
    const response = await fetch(api, {
        headers: {
            Authorization: "Bearer " + TOKEN,
            Accept: "application/vnd.github+json"
        }
    });

    let oldText = "";
    let sha = null;

    if (response.ok) {
        const json = await response.json();
        oldText = atob(json.content.replace(/\n/g, ""));
        sha = json.sha;
    }

    const newText =
        oldText +
        document.getElementById("input").value +
        "\n";

    await fetch(api, {
        method: "PUT",
        headers: {
            Authorization: "Bearer " + TOKEN,
            Accept: "application/vnd.github+json"
        },
        body: JSON.stringify({
            message: "Database update",
            content: btoa(newText),
            branch: BRANCH,
            sha: sha
        })
    });

    alert("Saved!");
}
</script>

</body>
</html>
