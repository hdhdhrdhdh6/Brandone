<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Video Playlist Player</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

h2{
    text-align:center;
    padding:15px;
}

#player{
    width:100%;
    height:60vh;
    border:none;
}

.playlist{
    max-width:900px;
    margin:auto;
    padding:10px;
}

button{
    width:100%;
    padding:15px;
    margin:8px 0;
    background:#222;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
    text-align:left;
}

button:hover{
    background:#e62117;
}
</style>
</head>

<body>

<h2>📺 Video Playlist</h2>

<iframe
id="player"
src="https://www.youtube.com/embed/M7lc1UVf-VE"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<div class="playlist">

<button onclick="play('M7lc1UVf-VE')">
YouTube API Demo
</button>

<button onclick="play('dQw4w9WgXcQ')">
Never Gonna Give You Up
</button>

<button onclick="play('7wtfhZwyrcc')">
Believer
</button>

<button onclick="play('60ItHLz5WEA')">
Alan Walker - Faded
</button>

<button onclick="play('JGwWNGJdvx8')">
Shape of You
</button>

<button onclick="play('RgKAFK5djSk')">
See You Again
</button>

</div>

<script>
function play(id){
    document.getElementById("player").src =
        "https://www.youtube.com/embed/" + id + "?autoplay=1";
}
</script>

</body>
</html>
