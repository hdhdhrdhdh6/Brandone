<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loop MP3 Player</title>
<style>
body{
    margin:0;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    color:#fff;
}
button{
    font-size:1.2rem;
    padding:15px 30px;
}
</style>
</head>
<body>

<button id="play">Start Playback</button>

<audio id="player" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const player = document.getElementById("player");
const btn = document.getElementById("play");

btn.onclick = async () => {
    try{
        await player.play();
        btn.textContent = "Playing...";
        requestWakeLock();
    }catch(e){
        alert("Playback requires user interaction.");
    }
};

// Restart if browser pauses it.
player.addEventListener("pause", async ()=>{
    try{
        await player.play();
    }catch(e){}
});

// Media Session support
if("mediaSession" in navigator){
    navigator.mediaSession.setActionHandler("pause", ()=>player.play());
    navigator.mediaSession.setActionHandler("play", ()=>player.play());
}

let wakeLock;

async function requestWakeLock(){
    if("wakeLock" in navigator){
        try{
            wakeLock = await navigator.wakeLock.request("screen");
            wakeLock.addEventListener("release", ()=>requestWakeLock());
        }catch(e){}
    }
}

document.addEventListener("visibilitychange", ()=>{
    if(!document.hidden){
        requestWakeLock();
        if(player.paused){
            player.play().catch(()=>{});
        }
    }
});
</script>

</body>
</html>
