<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:#fff;
}

header{
height:60px;
background:#202020;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
position:fixed;
top:0;
left:0;
right:0;
z-index:100;
}

.logo{
font-size:28px;
font-weight:bold;
color:red;
}

.search{
display:flex;
width:45%;
}

.search input{
flex:1;
padding:10px;
background:#121212;
border:1px solid #333;
color:white;
outline:none;
border-radius:20px 0 0 20px;
}

.search button{
padding:10px 20px;
background:#303030;
color:white;
border:none;
cursor:pointer;
border-radius:0 20px 20px 0;
}

.container{
display:flex;
margin-top:60px;
}

.sidebar{
width:220px;
background:#181818;
height:calc(100vh - 60px);
position:fixed;
overflow:auto;
}

.sidebar a{
display:block;
padding:16px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#333;
}

.main{
margin-left:220px;
padding:20px;
width:100%;
}

#player{
width:100%;
height:500px;
border:none;
border-radius:12px;
background:black;
}

.title{
font-size:24px;
margin:15px 0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
margin-top:30px;
}

.card{
cursor:pointer;
background:#181818;
border-radius:12px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.info{
padding:12px;
}

.info h3{
font-size:16px;
margin-bottom:8px;
}

.info p{
font-size:14px;
color:#aaa;
}

@media(max-width:800px){

.sidebar{
display:none;
}

.main{
margin-left:0;
}

.search{
width:65%;
}

#player{
height:250px;
}

}
</style>
</head>

<body>

<header>

<div class="logo">▶ YouTube</div>

<div class="search">
<input id="search" placeholder="Search videos">
<button>🔍</button>
</div>

<div>🔔 😊</div>

</header>

<div class="container">

<div class="sidebar">
<a href="#">🏠 Home</a>
<a href="#">🔥 Trending</a>
<a href="#">🎵 Music</a>
<a href="#">🎮 Gaming</a>
<a href="#">📺 Subscriptions</a>
<a href="#">📚 Library</a>
</div>

<div class="main">

<iframe
id="player"
src="https://www.youtube.com/embed/M7lc1UVf-VE"
allowfullscreen>
</iframe>

<h2 class="title" id="videoTitle">
YouTube API Demo
</h2>

<div class="grid" id="videos"></div>

</div>

</div>

<script>

const videos=[
{
title:"YouTube API Demo",
channel:"Google Developers",
views:"2.5M views",
id:"M7lc1UVf-VE",
thumb:"https://img.youtube.com/vi/M7lc1UVf-VE/hqdefault.jpg"
},
{
title:"Never Gonna Give You Up",
channel:"Rick Astley",
views:"1.5B views",
id:"dQw4w9WgXcQ",
thumb:"https://img.youtube.com/vi/dQw4w9WgXcQ/hqdefault.jpg"
},
{
title:"Imagine Dragons - Believer",
channel:"Imagine Dragons",
views:"2.8B views",
id:"7wtfhZwyrcc",
thumb:"https://img.youtube.com/vi/7wtfhZwyrcc/hqdefault.jpg"
},
{
title:"Alan Walker - Faded",
channel:"Alan Walker",
views:"3.7B views",
id:"60ItHLz5WEA",
thumb:"https://img.youtube.com/vi/60ItHLz5WEA/hqdefault.jpg"
},
  Next  
    <div class="info">
<h3>${v.title}</h3>
<p>${v.channel}</p>
<p>${v.views}</p>
</div>

</div>

`;

});

}

render(videos);

function play(id,title){

document.getElementById("player").src =
"https://www.youtube.com/embed/" + id + "?autoplay=1";

document.getElementById("videoTitle").innerText = title;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

const search=document.getElementById("search");

search.addEventListener("input",()=>{

const value=search.value.toLowerCase();

const filtered=videos.filter(v=>

v.title.toLowerCase().includes(value) ||

v.channel.toLowerCase().includes(value)

);

render(filtered);

});
</script>

</body>
</html>
