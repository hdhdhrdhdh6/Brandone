<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simple 2 Deck MP3 DJ Player</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    margin:0;
    background:#111;
    color:white;
}

h1{
    text-align:center;
    margin:15px;
}

.container{
    display:flex;
    flex-wrap:wrap;
    gap:15px;
    padding:15px;
}

.deck{
    flex:1 1 320px;
    background:#222;
    border-radius:15px;
    padding:15px;
}

.turntable{
    width:180px;
    height:180px;
    border-radius:50%;
    margin:auto;
    background:
    radial-gradient(circle,#555 0,#222 45%,#000 60%,#333 100%);
    border:6px solid #666;
}

.spin{
    animation:spin 2s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#00bcd4;
    color:white;
    font-size:16px;
}

input[type=file]{
    width:100%;
    margin:10px 0;
}

input[type=range]{
    width:100%;
}

.controls{
    margin-top:10px;
}

.cross{
    padding:20px;
    text-align:center;
}

label{
    display:block;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>Simple DJ Player</h1>

<div class="container">

<div class="deck">

<h2>Deck A</h2>

<div id="disc1" class="turntable"></div>

<input type="file" id="file1" accept="audio/*">

<button onclick="toggleDeck(1)">Play / Pause</button>

<div class="controls">

<label>Volume</label>

<input type="range"
id="vol1"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

<div class="deck">

<h2>Deck B</h2>

<div id="disc2" class="turntable"></div>

<input type="file" id="file2" accept="audio/*">

<button onclick="toggleDeck(2)">Play / Pause</button>

<div class="controls">

<label>Volume</label>

<input type="range"
id="vol2"
min="0"
max="1"
step="0.01"
value="1">

</div>

</div>

</div>

<div class="cross">

<h2>Crossfader</h2>

<input
type="range"
id="cross"
min="0"
max="100"
value="50">

</div>

<script>

const audio1=new Audio();
const audio2=new Audio();

audio1.loop=false;
audio2.loop=false;

file1.onchange=e=>{
audio1.src=URL.createObjectURL(e.target.files[0]);
}

file2.onchange=e=>{
audio2.src=URL.createObjectURL(e.target.files[0]);
}

function toggleDeck(n){

let a=n==1?audio1:audio2;

let d=n==1?disc1:disc2;

if(a.paused){

a.play();

d.classList.add("spin");

}else{

a.pause();

d.classList.remove("spin");

}

}

function updateMix(){

let c=cross.value/100;

let v1=vol1.value;

let v2=vol2.value;

audio1.volume=v1*(1-c);

audio2.volume=v2*c;

}

cross.oninput=updateMix;

vol1.oninput=updateMix;

vol2.oninput=updateMix;

updateMix();

audio1.onended=()=>disc1.classList.remove("spin");
audio2.onended=()=>disc2.classList.remove("spin");

</script>

</body>
</html>
