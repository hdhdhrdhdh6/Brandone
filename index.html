<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:60px;
    background:#212121;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    font-size:24px;
    font-weight:bold;
    color:red;
}

.logo span{
    color:white;
    margin-left:5px;
}

.search{
    display:flex;
    width:45%;
}

.search input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
    background:#121212;
    color:white;
    border-radius:20px 0 0 20px;
}

.search button{
    width:60px;
    border:none;
    background:#303030;
    color:white;
    cursor:pointer;
    border-radius:0 20px 20px 0;
}

.container{
    display:flex;
    margin-top:60px;
}

.sidebar{
    width:220px;
    background:#181818;
    height:calc(100vh - 60px);
    position:fixed;
    overflow:auto;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

.sidebar a:hover{
    background:#333;
}

.content{
    margin-left:220px;
    padding:20px;
    width:100%;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:20px;
}

.card{
    cursor:pointer;
}

.thumb{
    width:100%;
    height:180px;
    background:#333;
    border-radius:12px;
    overflow:hidden;
}

.thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.info{
    display:flex;
    margin-top:10px;
}

.avatar{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#666;
    margin-right:10px;
}

.details h3{
    font-size:16px;
    margin-bottom:5px;
}

.details p{
    color:#aaa;
    font-size:14px;
}

@media(max-width:768px){

.sidebar{
    display:none;
}

.content{
    margin-left:0;
}

.search{
    width:60%;
}

}
</style>
</head>

<body>

<header>

<div class="logo">
▶ <span>YouTube</span>
</div>

<div class="search">
<input type="text" placeholder="Search">
<button>🔍</button>
</div>

<div>
🔔 😊
</div>

</header>

<div class="container">

<div class="sidebar">
<a href="#">🏠 Home</a>
<a href="#">🔥 Trending</a>
<a href="#">🎵 Music</a>
<a href="#">🎮 Gaming</a>
<a href="#">📺 Subscriptions</a>
<a href="#">📚 Library</a>
<a href="#">🕘 History</a>
</div>

<div class="content">

<div class="grid" id="videos"></div>

</div>

</div>

<script>

const data=[
{
title:"Build a YouTube Clone",
channel:"Code Studio",
views:"1.2M views • 2 days ago",
image:"https://picsum.photos/500/300?1"
},
{
title:"Learn HTML in 30 Minutes",
channel:"Web Academy",
views:"850K views • 1 week ago",
image:"https://picsum.photos/500/300?2"
},
{
title:"CSS Animations",
channel:"Frontend Pro",
views:"950K views • 5 days ago",
image:"https://picsum.photos/500/300?3"
},
{
title:"JavaScript Tutorial",
channel:"Programming Hub",
views:"2.3M views • 1 month ago",
image:"https://picsum.photos/500/300?4"
},
{
title:"Responsive Website Design",
channel:"Creative Dev",
views:"440K views • 6 days ago",
image:"https://picsum.photos/500/300?5"
},
{
title:"React Crash Course",
channel:"React World",
views:"3.4M views • 3 months ago",
image:"https://picsum.photos/500/300?6"
}
];

const container=document.getElementById("videos");

data.forEach(video=>{

container.innerHTML+=`
<div class="card">

<div class="thumb">
<img src="${video.image}">
</div>

<div class="info">

<div class="avatar"></div>

<div class="details">
<h3>${video.title}</h3>
<p>${video.channel}</p>
<p>${video.views}</p>
</div>

</div>

</div>
`;

});

</script>

</body>
</html>
