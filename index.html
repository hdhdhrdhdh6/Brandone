
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Words Background</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Consolas,Monaco,monospace;
}

.container{
    display:flex;
    width:100%;
    height:100%;
}

.left{
    width:66.666%;
    position:relative;
    overflow:hidden;
    background:#020202;
}

.right{
    width:33.333%;
    background:#000;
}

canvas{
    position:absolute;
    inset:0;
}
</style>
</head>
<body>

<div class="container">
    <div class="left">
        <canvas id="matrix"></canvas>
    </div>
    <div class="right"></div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;

    fontSize = 18;
    columns = Math.floor(canvas.width / fontSize);

    drops = [];
    for(let i=0;i<columns;i++){
        drops[i]=Math.random()*-100;
    }
}

let fontSize = 18;
let columns = 0;
let drops = [];

window.addEventListener("resize",resize);
resize();

const words = [
"future","dream","code","vision","light","energy","water","forest",
"ocean","planet","galaxy","create","imagine","freedom","knowledge",
"wisdom","science","nature","motion","gravity","signal","network",
"pixel","binary","system","matrix","shadow","echo","time","space",
"velocity","horizon","quantum","memory","process","dynamic","electric",
"power","focus","clarity","innovation","logic","design","machine",
"human","language","learning","progress","explore","discover","truth",
"strength","courage","hope","peace","inspire","future","journey",
"adventure","cosmos","infinite","beyond","origin","spark","stream",
"neural","algorithm","computer","vision","creative","resilience",
"curiosity","connection","harmony","balance","moment","possibility"
];

function randomWord(){
    return words[Math.floor(Math.random()*words.length)];
}

function draw(){

    ctx.fillStyle = "rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.font = fontSize + "px Consolas";

    for(let i=0;i<drops.length;i++){

        const word = randomWord();
        const x = i * fontSize;
        const y = drops[i] * fontSize;

        // glow
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00ff66";

        // bright leading word
        ctx.fillStyle = "#c8ffd8";
        ctx.fillText(word,x,y);

        // trailing words
        for(let j=1;j<5;j++){
            ctx.globalAlpha = 0.22/j;
            ctx.fillStyle="#00ff66";
            ctx.fillText(
                randomWord(),
                x,
                y-(j*fontSize*1.2)
            );
        }

        ctx.globalAlpha = 1;

        if(y > canvas.height && Math.random() > 0.975){
            drops[i]=0;
        }

        drops[i]+=0.55 + Math.random()*0.6;
    }
}

setInterval(draw,50);
</script>

</body>
</html>
